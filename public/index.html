<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Test Tool - Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .spinner {
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 2px solid #4ade80;
            width: 14px;
            height: 14px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="sidebar">
        <div class="sidebar-header">
            <h1>Projects</h1>
            <div style="margin-top: 15px;">
                <form id="create-project-form" style="display: flex; flex-direction: column; gap: 5px;">
                    <input type="text" id="project-name-input" placeholder="Project Name" required style="padding: 5px; border-radius: 4px; border: 1px solid #ccc; background: #2a2a2a; color: white;">
                    <input type="url" id="project-url-input" placeholder="https://..." required style="padding: 5px; border-radius: 4px; border: 1px solid #ccc; background: #2a2a2a; color: white;">
                    <button type="submit" style="padding: 5px 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer;">Create Project</button>
                </form>
                <div id="create-project-status" style="font-size: 0.8rem; margin-top: 5px; color: #aaa;"></div>
            </div>
        </div>
        <ul id="project-list">
            <!-- Populated by JS -->
        </ul>
    </div>
    
    <div id="main">
        <div class="main-header" style="flex-direction: column; align-items: stretch; gap: 10px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2 id="current-project-title">Select a Project</h2>
                <div id="project-actions" style="display: none; gap: 10px; align-items: center;">
                    <div id="progress-indicator" style="display: none; color: #4ade80; font-size: 0.9rem; font-weight: bold; align-items: center; gap: 5px;">
                        <div class="spinner"></div> Working...
                    </div>
                    <button id="crawl-btn" style="padding: 5px 15px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer;">1. Crawl Site</button>
                </div>
            </div>

            <!-- Findings Header & Filters -->
            <div id="findings-header" style="display: none; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px;">
                <h3 style="margin: 0;">Findings</h3>
                <div id="findings-filters" style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
                    <select id="filter-audit" style="padding: 6px; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px;">
                        <option value="all">All Audits</option>
                    </select>
                    <button id="delete-audit-btn" onclick="deleteSelectedAudit()" style="padding: 6px 10px; background: #dc2626; color: white; border: none; border-radius: 4px; cursor: pointer; display: none;">🗑️ Delete</button>
                    
                    <button onclick="exportCsv()" style="padding: 6px 12px; background: #10b981; color: white; border: none; border-radius: 4px; cursor: pointer;">Export to CSV</button>
                    <button id="run-audit-modal-btn" style="padding: 5px 15px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer;">2. Run Audits</button>
                </div>
            </div>
            
            <!-- Pages List Area -->
            <div id="pages-container" style="display: none; border-top: 1px solid #333; padding-top: 10px; margin-bottom: 15px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
                    <h3 style="margin: 0;">Project Pages</h3>
                    <form id="add-page-form" style="display: flex; gap: 5px;">
                        <input type="url" id="manual-page-url" placeholder="https://.../checkout" required style="padding: 3px 5px; border-radius: 4px; border: 1px solid #444; background: #2a2a2a; color: white; width: 250px;">
                        <button type="submit" style="padding: 3px 10px; background: #6c757d; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem;">+ Add Page</button>
                    </form>
                </div>
                <ul id="pages-list" style="list-style: none; padding: 0; max-height: 150px; overflow-y: auto; background: #1e1e1e; border: 1px solid #333; border-radius: 4px; padding: 5px; margin: 0;">
                    <!-- Populated by JS -->
                </ul>
            </div>
            
            <div style="display: none; justify-content: space-between; align-items: center; margin-bottom: 15px;" id="findings-header">
                <div class="filters" id="findings-filters" style="margin-bottom: 0;">
                    <select id="filter-severity">
                        <option value="">All Severities</option>
                        <option value="critical">Critical</option>
                        <option value="serious">Serious</option>
                        <option value="moderate">Moderate</option>
                        <option value="minor">Minor</option>
                    </select>
                    <select id="filter-category">
                        <option value="">All Categories</option>
                    </select>
                    <select id="filter-status">
                        <option value="">All Statuses</option>
                        <option value="open">Open</option>
                        <option value="fixed">Fixed</option>
                        <option value="wontfix">Won't Fix</option>
                    </select>
                    <select id="filter-page">
                        <option value="">All Pages</option>
                    </select>
                </div>
                <button id="export-csv-btn" style="padding: 5px 15px; background: #17a2b8; color: white; border: none; border-radius: 4px; cursor: pointer;">Export to CSV</button>
            </div>
        </div>
        
        <div id="content">
            <table id="findings-table" style="display: none;">
                <thead>
                    <tr>
                        <th>Page</th>
                        <th>Tool</th>
                        <th>Category</th>
                        <th>Severity</th>
                        <th>Issue</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="findings-body">
                    <!-- Populated by JS -->
                </tbody>
            </table>
            <div id="empty-state" style="text-align: center; color: var(--text-muted); margin-top: 50px;">
                Select a project from the sidebar to view its details and findings.
            </div>
        </div>
    </div>

    <!-- Audit Modal -->
    <div id="audit-modal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center;">
        <div style="background: #1e1e1e; padding: 20px; border-radius: 8px; width: 400px; border: 1px solid #333;">
            <h3 style="margin-top: 0;">Run Audit</h3>
            <form id="run-audit-form" style="display: flex; flex-direction: column; gap: 15px;">
                <div>
                    <label style="display: block; margin-bottom: 5px;">Target Page(s):</label>
                    <select id="audit-target-page" style="width: 100%; padding: 5px; background: #2a2a2a; color: white; border: 1px solid #444; border-radius: 4px;">
                        <option value="all">All Pages</option>
                        <!-- Populated by JS -->
                    </select>
                </div>
                
                <div>
                    <label style="display: block; margin-bottom: 5px;">Engines to Run:</label>
                    <div style="display: flex; flex-direction: column; gap: 5px;">
                        <label><input type="checkbox" name="categories" value="console" checked> Playwright (Console & Network)</label>
                        <label><input type="checkbox" name="categories" value="axe" checked> Axe-Core (Accessibility)</label>
                        <label><input type="checkbox" name="categories" value="lighthouse" checked> Lighthouse (Performance)</label>
                        <label><input type="checkbox" name="categories" value="links" checked> Linkinator (Broken Links)</label>
                        <label style="display: block; margin-bottom: 5px;"><input type="checkbox" name="categories" value="visual" checked> <strong>Take Evidence Screenshots (Visual Annotator)</strong> <br><small style="color: #999; margin-left: 20px;">* Takes photos of bugs found by the engines above. Does nothing if run alone.</small></label>
                    </div>
                </div>

                <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px;">
                    <button type="button" id="close-modal-btn" style="padding: 5px 15px; background: #444; color: white; border: none; border-radius: 4px; cursor: pointer;">Cancel</button>
                    <button type="submit" style="padding: 5px 15px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer;">Start Audit</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
